    <style>
        :root {
            --bg: #f0f4f5; --surface: #ffffff; --surface2: #e8f0f2;
            --text: #1a2b2c; --text2: #4a5b5c;
            --primary: #0d6b6e; --primary-light: #0f8a8e; --primary-dark: #094a4d;
            --accent: #e8943a; --accent-light: #f5b870;
            --success: #2d8a4e; --danger: #c0392b; --warning: #d4a017;
            --border: #c8d6d8; --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            --radius: 12px; --radius-sm: 8px; --transition: 0.2s ease;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --nav-height: 64px; --max-width: 900px; --card-gap: 14px;
        }

        .dark-mode {
            --bg: #121a1b; --surface: #1a2628; --surface2: #1e2c2e;
            --text: #e0e8e9; --text2: #a0b4b6;
            --primary: #1a9a9e; --primary-light: #22b8bd; --primary-dark: #0d6b6e;
            --accent: #f0a550; --accent-light: #f5c080;
            --success: #3cb064; --danger: #e05545; --warning: #e6b830;
            --border: #2a3a3c; --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; -webkit-tap-highlight-color: transparent; transition: background var(--transition), color var(--transition); padding-bottom: calc(var(--nav-height) + 20px); user-select: none; }

        .app-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 16px; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
        .header-inner { max-width: var(--max-width); margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .logo { font-size: 1.3rem; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        .btn-icon { width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; transition: all var(--transition); }
        .btn-icon:active { transform: scale(0.93); background: var(--surface2); }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; z-index: 100; box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.06); height: var(--nav-height); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; cursor: pointer; color: var(--text2); font-size: 0.7rem; font-weight: 500; border: none; background: none; position: relative; }
        .nav-item.active { color: var(--primary); }
        .nav-item.active::after { content: ''; position: absolute; top: 0; left: 20%; right: 20%; height: 3px; background: var(--primary); border-radius: 0 0 3px 3px; }

        .main-content { max-width: var(--max-width); margin: 0 auto; padding: 16px; animation: fadeIn 0.25s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--surface); border-radius: var(--radius); padding: 16px; margin-bottom: var(--card-gap); box-shadow: var(--shadow); border: 1px solid var(--border); }
        .card-header { font-weight: 700; font-size: 1.1rem; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .stat-card { background: var(--surface2); border-radius: var(--radius-sm); padding: 14px 12px; text-align: center; border: 1px solid var(--border); }
        .stat-value { font-size: 1.8rem; font-weight: 700; color: var(--primary); }
        .stat-label { font-size: 0.75rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }

        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: all var(--transition); font-family: var(--font); }
        .btn:active { transform: scale(0.95); }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-accent { background: var(--accent); color: #fff; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-sm { padding: 6px 12px; font-size: 0.78rem; border-radius: 6px; }
        .btn-block { width: 100%; justify-content: center; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-success { background: var(--success); color: #fff; }

        input, select, textarea { width: 100%; padding: 10px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); font-family: var(--font); font-size: 0.9rem; background: var(--surface); color: var(--text); margin-bottom: 8px; }
        label { font-weight: 600; font-size: 0.85rem; color: var(--text2); display: block; margin-bottom: 4px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

        .question-block { background: var(--surface); border-radius: var(--radius); padding: 20px; margin-bottom: 14px; border: 1px solid var(--border); }
        .question-text { font-weight: 600; font-size: 1.05rem; margin-bottom: 14px; }
        .option-btn { display: block; width: 100%; text-align: left; padding: 12px 16px; margin: 6px 0; border-radius: var(--radius-sm); border: 2px solid var(--border); background: var(--surface); cursor: pointer; font-size: 0.92rem; transition: all var(--transition); color: var(--text); }
        .option-btn.selected { border-color: var(--primary); background: rgba(13, 107, 110, 0.08); font-weight: 600; }
        .option-btn.correct { border-color: var(--success) !important; background: rgba(45, 138, 78, 0.12) !important; color: var(--success) !important; }
        .option-btn.wrong { border-color: var(--danger) !important; background: rgba(192, 57, 43, 0.1) !important; color: var(--danger) !important; }
        .explanation-box { margin-top: 12px; padding: 14px; background: var(--surface2); border-radius: var(--radius-sm); border-left: 4px solid var(--primary); font-size: 0.9rem; color: var(--text2); }
        
        .badge { display: inline-block; padding: 4px 10px; border-radius: 14px; font-size: 0.7rem; font-weight: 600; }
        .badge-primary { background: rgba(13, 107, 110, 0.12); color: var(--primary); }
        .badge-accent { background: rgba(232, 147, 58, 0.12); color: var(--accent); }
        .badge-success { background: rgba(45, 138, 78, 0.12); color: var(--success); }
        .badge-danger { background: rgba(192, 57, 43, 0.1); color: var(--danger); }
        .badge-group { background: rgba(108, 92, 231, 0.12); color: #6c5ce7; }
        
        .timer-display { font-size: 2rem; font-weight: 700; text-align: center; color: var(--primary); }
        .timer-warning { color: var(--warning) !important; }
        .timer-danger { color: var(--danger) !important; }
        .progress-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; margin: 8px 0; }
        .progress-fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width 0.3s; }
        .hidden { display: none !important; }
        .text-center { text-align: center; }
        .mt-2 { margin-top: 12px; }
        .flex-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
        .empty-state { text-align: center; padding: 40px 20px; color: var(--text2); }
        .highlight { background: rgba(232, 147, 58, 0.3); padding: 0 2px; border-radius: 2px; }
        .modal-field { margin-bottom: 12px; }

        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }

        const ALL_SUBJECTS = Object.keys(ENT_DATA).sort();
        const ALL_CHAPTERS = Object.values(ENT_DATA).flat().sort((a, b) => a.localeCompare(b));

        // ============================================================
        //  DATABASE
        // ============================================================
        const DB_NAME = 'ENTQuestionBank';
        const DB_VERSION = 6;

        class ENTDatabase {
            constructor() { this.db = null; this.ready = this.init(); }
            init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, DB_VERSION);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains('questions')) {
                            const qStore = db.createObjectStore('questions', { keyPath: 'id', autoIncrement: true });
                            qStore.createIndex('subject', 'subject', { unique: false });
                            qStore.createIndex('chapter', 'chapter', { unique: false });
                            qStore.createIndex('topic', 'topic', { unique: false });
                            qStore.createIndex('group', 'group', { unique: false });
                        }
                        if (!db.objectStoreNames.contains('examHistory')) db.createObjectStore('examHistory', { keyPath: 'id', autoIncrement: true });
                        if (!db.objectStoreNames.contains('bookmarks')) db.createObjectStore('bookmarks', { keyPath: 'questionId' });
                        if (!db.objectStoreNames.contains('notes')) db.createObjectStore('notes', { keyPath: 'questionId' });
                        if (!db.objectStoreNames.contains('settings')) db.createObjectStore('settings', { keyPath: 'key' }); if (!db.objectStoreNames.contains('performance')) db.createObjectStore('performance', { keyPath: 'id', autoIncrement: true }); if (!db.objectStoreNames.contains('highYield')) db.createObjectStore('highYield', { keyPath: 'questionId' });
                    };
                    request.onsuccess = (e) => {
                        this.db = e.target.result;

                        this.db.onversionchange = () => {
                            this.db.close();
                            alert('A newer version of ENT Master Bank is available. Please reload the page.');
                        };

                        resolve();
                    };

                    request.onblocked = () => {
                        console.warn('IndexedDB upgrade blocked by another open tab.');
                    };

                    request.onerror = (e) => reject(e.target.error);
                });
            }
            async ensureReady() { await this.ready; }
            async addQuestion(q) {
                await this.ensureReady();
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction('questions', 'readwrite');
                    q.dateAdded = new Date().toISOString();
                    q.tags = q.tags || [];
                    if (!q.group) q.group = '';
                    const req = tx.objectStore('questions').add(q);
                    req.onsuccess = (e) => resolve(e.target.result);
                    req.onerror = (e) => reject(e.target.error);
                    tx.onerror = (e) => reject(tx.error || e.target.error);
                });
            }
            async getAllQuestions() {
                await this.ensureReady();
                return new Promise(resolve => {
                    this.db.transaction('questions', 'readonly').objectStore('questions').getAll().onsuccess = (e) => resolve(e.target.result);
                });
            }
            async getQuestion(id) {
                await this.ensureReady();
                return new Promise(resolve => {
                    this.db.transaction('questions', 'readonly').objectStore('questions').get(id).onsuccess = (e) => resolve(e.target.result);
                });
            }
            async deleteQuestion(id) {
                await this.ensureReady();
                return new Promise(resolve => {
                    const tx = this.db.transaction(['questions', 'bookmarks', 'notes'], 'readwrite');
                    tx.objectStore('questions').delete(id);
                    tx.objectStore('bookmarks').delete(id);
                    tx.objectStore('notes').delete(id);
                    tx.oncomplete = () => resolve();
                });
            }
            async toggleBookmark(qid) {
                await this.ensureReady();
                return new Promise(resolve => {
                    const tx = this.db.transaction('bookmarks', 'readwrite');
                    const store = tx.objectStore('bookmarks');
                    const get = store.get(qid);
                    get.onsuccess = () => {
                        if (get.result) { store.delete(qid); resolve(false); } 
                        else { store.add({ questionId: qid }); resolve(true); }
                    };
                });
            }
            async isBookmarked(qid) {
                await this.ensureReady();
                return new Promise(resolve => {
                    this.db.transaction('bookmarks', 'readonly').objectStore('bookmarks').get(qid).onsuccess = (e) => resolve(!!e.target.result);
                });
            }
            async getAllBookmarkedIds() {
                await this.ensureReady();
                return new Promise(resolve => {
                    this.db.transaction('bookmarks', 'readonly').objectStore('bookmarks').getAll().onsuccess = (e) => resolve(e.target.result.map(b => b.questionId));
                });
            }
            async saveExamResult(result) {
                try {
                    await this.ensureReady();
                    return new Promise((resolve, reject) => {
                        result.date = new Date().toISOString();
                        const tx = this.db.transaction('examHistory', 'readwrite');
                        tx.objectStore('examHistory').add(result).onsuccess = (e) => resolve(e.target.result);
                        tx.onerror = (e) => resolve(null); // safely fail
                    });
                } catch(e) { console.error("Error saving exam result", e); }
            }
            async getExamHistory() {
                await this.ensureReady();
                return new Promise(resolve => {
                    this.db.transaction('examHistory', 'readonly').objectStore('examHistory').getAll().onsuccess = (e) => resolve(e.target.result.reverse());
                });
            }
            async getSetting(key, def = null) {
                await this.ensureReady();
                return new Promise(resolve => {
                    const tx = this.db.transaction('settings', 'readonly');
                    tx.objectStore('settings').get(key).onsuccess = (e) => resolve(e.target.result ? e.target.result.value : def);
                });
            }
            async setSetting(key, value) {
                await this.ensureReady();
                return new Promise(resolve => {
                    this.db.transaction('settings', 'readwrite').objectStore('settings').put({ key, value });
                    resolve();
                });
            }

            // AUTO-CATEGORIZATION ENABLED BULK IMPORT
            async bulkImport(questions, groupName = '') {
                await this.ensureReady();
                const existingQuestions = await this.getAllQuestions();
                const existingSet = new Set(
                    existingQuestions.map(e => ((e.questionText||'').replace(/\s+/g,' ').replace(/[^a-z0-9 ]/gi,'').trim().toLowerCase()))
                );
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction('questions', 'readwrite');
                    const store = tx.objectStore('questions');
                    let count = 0;
                    
                    const allSubjects = Object.keys(ENT_DATA);
                    const allChapters = Object.values(ENT_DATA).flat();
                    const stopWords = ['and', 'of', 'the', 'in', 'to', 'for', 'with', 'on', 'at', 'by', 'from', 'an', 'a', 'management', 'assessment', 'disorders', 'conditions', 'disease', 'surgery', 'anatomy', 'physiology', 'acute', 'chronic', 'clinical'];

for (const q of questions) {
                        q.dateAdded = q.dateAdded || new Date().toISOString();
                        q.tags = q.tags || [];
                        if (groupName && !q.group) q.group = groupName;
                        if (!q.group) q.group = '';

                        // Combine all text fields to search for matching keywords
                        const textToSearch = [
                            q.questionText || '', 
                            q.optionA || '', q.optionB || '', q.optionC || '', 
                            q.optionD || '', q.optionE || '', q.explanation || ''
                        ].join(' ').toLowerCase();

                        let bestSubject = 'Uncategorized';
                        let bestChapter = 'General';
                        let highestScore = 0;

                        for (const [subject, chapters] of Object.entries(ENT_DATA)) {
                            for (const chapter of chapters) {
                                let score = 0;
                                const chapLower = chapter.toLowerCase();
                                const subjLower = subject.toLowerCase();

                                // Exact chapter phrase match (highest weight)
                                if (textToSearch.includes(chapLower)) score += 15;
                                
                                // Exact subject phrase match (medium weight)
                                if (textToSearch.includes(subjLower)) score += 5;

                                // Keyword match (lower weight)
                                const keywords = chapLower.split(/[\s,:-]+/)
                                    .map(w => w.trim().replace(/[^a-z0-9]/g, ''))
                                    .filter(w => w.length > 3 && !stopWords.includes(w));

                                for (const word of keywords) {
                                    if (textToSearch.includes(word)) score += 2;
                                }

                                if (score > highestScore) {
                                    highestScore = score;
                                    bestSubject = subject;
                                    bestChapter = chapter;
                                }
                            }
                        }

                        // Apply the best match if the question doesn't already have a valid category
                        if (!q.subject || !allSubjects.includes(q.subject) || q.subject === 'Uncategorized') {
                            q.subject = highestScore > 0 ? bestSubject : 'Uncategorized';
                        }
                        if (!q.chapter || !allChapters.includes(q.chapter) || q.chapter === 'General') {
                            q.chapter = highestScore > 0 ? bestChapter : 'General';
                        }

                        const normalizedNew = (q.questionText||'').replace(/\s+/g,' ').replace(/[^a-z0-9 ]/gi,'').trim().toLowerCase();
let duplicate = false;
try{
duplicate = existingSet.has(normalizedNew);
if(!duplicate){
existingSet.add(normalizedNew);
store.add(q);
count++;
}
}catch(err){
store.add(q);
count++;
}
                    }
                    
                    tx.oncomplete = () => resolve(count);
                    tx.onerror = () => reject(tx.error);
                });
            }

    // Keep only questions whose MOST RECENT attempt was wrong
    const latest = {};
    perf.forEach((x,i)=>{

        latest[key] = {correct:x.correct, idx:i};

    const wrongIds = Object.keys(latest)

        async function handleImport() {
            const format = $('#importFormat').value; const raw = $('#importData').value; const groupName = $('#importGroup').value.trim();
            try {
                let questions = [];
                if (format === 'json') questions = JSON.parse(raw);
                else if (format === 'csv') questions = parseCSV(raw);
                if (!Array.isArray(questions) || questions.length === 0) throw new Error('No valid questions');
                const count = await db.bulkImport(questions, groupName);
                showToast(`Imported ${count} questions and auto-categorized!`, 'success');
                navigateTo('dashboard');
            } catch (e) { showToast('Import error: ' + e.message, 'error'); }
        }

        function parseCSV(csv) {
            const lines = csv.trim().split('\n'); if (lines.length < 2) return [];
            const headers = lines[0].split(',').map(h => h.trim());
            return lines.slice(1).map(line => {
                const vals = line.split(',').map(v => v.trim()); const q = {};
                headers.forEach((h, i) => { q[h] = vals[i] || ''; }); return q;
            });
        }

window.generateWeakTopicAnalytics = async function(){
 const perf = await db.getPerformance();
 const stats = {};
 perf.forEach(r=>{
   const key = `${r.subject||'Unknown'}|||${r.chapter||'Unknown'}|||${r.topic||'Unknown'}`;
   if(!stats[key]) stats[key]={total:0,correct:0,subject:r.subject||'Unknown',chapter:r.chapter||'Unknown',topic:r.topic||'Unknown'};
   stats[key].total++;
   if(r.correct) stats[key].correct++;
 });
 return Object.values(stats)
   .map(x=>({...x,accuracy:Math.round((x.correct*100)/x.total)}))
   .sort((a,b)=>a.accuracy-b.accuracy);
};

async function scanDuplicateQuestions(){
 const qs=await db.getAllQuestions();
 const seen=new Map();
 const dup=[];
 qs.forEach(q=>{
   const key=(q.questionText||'').replace(/\s+/g,' ').trim().toLowerCase();
   if(seen.has(key)) dup.push(q);
   else seen.set(key,true);
 });
 alert('Duplicate Questions Found: '+dup.length);
 return dup.length;
}

document.addEventListener('click',async function(e){
 if(e.target && e.target.id==='btnScanDuplicates'){
   await scanDuplicateQuestions();
 }
});

async function buildSubjectAnalytics(){
 try{
   const perf=await db.getPerformance();
   const holder=document.getElementById('subjectAnalyticsContainer');
   if(!holder) return;

   const stats={};
   perf.forEach(p=>{
      const s=p.subject||'Unknown';
      if(!stats[s]) stats[s]={t:0,c:0};
      stats[s].t++;
      if(p.correct) stats[s].c++;
   });

   const rows=Object.entries(stats)
      .map(([s,v])=>({s,p:Math.round((v.c*100)/Math.max(v.t,1))}))
      .sort((a,b)=>a.p-b.p);

   holder.innerHTML=rows.length
      ? rows.map(r=>`<div style="display:flex;justify-content:space-between;padding:6px 0"><span>${r.s}</span><span>${r.p}%</span></div>`).join('')
      : 'No analytics yet';
 }catch(e){}
}

document.addEventListener('DOMContentLoaded',()=>setTimeout(buildSubjectAnalytics,1000));
</script>

<script>
// STEP 21 - Adaptive Learning Engine
async function getWeakQuestionIds(){
 const perf = await db.getPerformance();
 const scoreMap = {};
 perf.forEach(x=>{
   const id=x.questionId;
   if(!scoreMap[id]) scoreMap[id]={c:0,w:0};
   x.correct ? scoreMap[id].c++ : scoreMap[id].w++;
 });
 return Object.entries(scoreMap)
   .filter(([k,v])=>v.w > v.c)
   .map(([k])=>Number(k));
}

window.startAdaptiveStudy = async function(){
 const weakIds = await getWeakQuestionIds();
 const all = await db.getAllQuestions();
 const weakQuestions = all.filter(q=>weakIds.includes(q.id));

 if(!weakQuestions.length){
   alert("No weak questions found yet. Answer more questions first.");
   return;
 }

 localStorage.setItem("adaptiveQuestions", JSON.stringify(weakQuestions));

 AppState.studyQuestions = [...weakQuestions].sort(() => Math.random() - 0.5);
 AppState.studyIndex = 0;
 AppState.studyAnswers = {};
 AppState.studyRevealed = {};

 navigateTo('study');

 setTimeout(() => {
   if(typeof renderStudyQuestion === 'function'){
      renderStudyQuestion();
   }
 }, 100);
};
</script>

});
</script>

   const s = x.subject || "Unknown";
   if(!map[s]) map[s] = {t:0,c:0};
   map[s].t++;
   if(x.correct) map[s].c++;
 });

      return `<div style="display:flex;justify-content:space-between;padding:6px 0">
      <span>${s}</span><span>${p}%</span></div>`;
   }).join("") || "No analytics yet.";
};
